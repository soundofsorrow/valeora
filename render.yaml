services:
  - type: web
    name: valeora
    runtime: static
    buildCommand: mkdir -p public/assets && cp index.html styles.css script.js public/ && cp assets/valeora-logo.svg assets/favicon.svg public/assets/
    staticPublishPath: public
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=86400
